<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Good Morning ☀️</title>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- MAIN CARD -->
    <div class="card">
      <h1>Good Morning Cutu🥹</h1>

      <p class="message">
        i hope aaj mera shona happy happy rahe,<br>
        try poora karunga and ill make sure u dont lose kisi bhi cheez me 💗
      </p>

      <button onclick="showMessage()">Tap this 🥹👉🏻👈🏻</button>

      <p id="hiddenMessage" class="hidden">
      11:11 i wish u keep smiling forever🌷
      </p>
    </div>

    <!-- QR SECTION -->
    <div class="qr-section">
      <h2>suno na ;-; scan this <br> (or tap on it) 📱</h2>
      <p>theres something waiting for u 🥹</p>

      <!-- CLICKABLE QR -->
      <a href="https://cutu-please-be-myduo.vercel.app/" target="_blank">
        <img src="qr-placeholder.png" alt="QR Code" class="qr">
      </a>

      <p class="note">(fingers crossed 🥹🤞🏻)</p>
    </div>

  </div>

  <script>
    function showMessage() {
      document.getElementById("hiddenMessage").style.display = "block";
    }
  </script>

</body>
</html>
